# Проверка либы на RN 0.80 и 0.83 (example совместим с React 19 + CLI 20)
name: Test RN versions

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: test-rn-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-android:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rn: '0.80.0'
            react: '19.2.0'
            cli: '20.0.0'
          - rn: '0.83.0'
            react: '19.2.0'
            cli: '20.0.0'

    env:
      TURBO_CACHE_DIR: .turbo/android-rn-${{ matrix.rn }}

    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: .nvmrc

      - name: Override RN stack for ${{ matrix.rn }}
        env:
          RN_VERSION: ${{ matrix.rn }}
          REACT_VERSION: ${{ matrix.react }}
          CLI_VERSION: ${{ matrix.cli }}
        run: node scripts/override-rn-versions.js

      - name: Install
        run: yarn install

      - uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00
        with:
          distribution: 'zulu'
          java-version: '17'

      - run: /bin/bash -c "yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null" 2>/dev/null || true

      - name: Build library
        run: yarn prepare

      - name: Build Android
        env:
          JAVA_OPTS: "-XX:MaxHeapSize=6g"
        run: |
          cd example
          yarn build:android

  test-ios:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rn: '0.80.0'
            react: '19.2.0'
            cli: '20.0.0'
          - rn: '0.83.0'
            react: '19.2.0'
            cli: '20.0.0'

    env:
      RCT_USE_RN_DEP: 1
      RCT_USE_PREBUILT_RNCORE: 1

    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: .nvmrc

      - name: Override RN stack for ${{ matrix.rn }}
        env:
          RN_VERSION: ${{ matrix.rn }}
          REACT_VERSION: ${{ matrix.react }}
          CLI_VERSION: ${{ matrix.cli }}
        run: node scripts/override-rn-versions.js

      - name: Install
        run: yarn install

      - name: Build library
        run: yarn prepare

      - name: Pod install
        run: |
          cd example
          bundle install
          bundle exec pod install --project-directory=ios

      - name: Build iOS
        run: |
          cd example
          yarn build:ios
