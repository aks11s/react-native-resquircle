# CD: публикация в npm при пуше тега v*
# Требуется: GitHub Secret NPM_TOKEN — granular token с "Bypass 2FA" или classic Automation token
# https://docs.npmjs.com/creating-and-viewing-access-tokens
name: Publish to npm

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # для provenance

    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Check NPM_TOKEN
        run: |
          if [[ -z "${{ secrets.NPM_TOKEN }}" ]]; then
            echo "::error::NPM_TOKEN secret not set. Add it in repo Settings → Secrets."
            echo "Use a granular token with 'Bypass 2FA' or classic Automation token."
            exit 1
          fi

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: .nvmrc
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: yarn install --immutable

      - name: Build
        run: yarn prepare

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
