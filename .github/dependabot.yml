# Dependabot: автопуллы для обновления зависимостей
version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      react-native:
        patterns:
          - 'react-native'
          - '@react-native/*'
        update-types:
          - minor
          - patch
    commit-message:
      prefix: 'chore(deps)'
  - package-ecosystem: npm
    directory: '/example'
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: monthly
